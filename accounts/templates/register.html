{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; font-family: sans-serif;">
    <h2 style="text-align: center;">Registrar</h2>
    
    <form method="post">
        {% csrf_token %}
        
        <div style="margin-bottom: 15px;">
            <label>Usuário:</label><br>
            {{ user_form.username }}
        </div>

        <div style="margin-bottom: 15px;">
            <label>Senha:</label><br>
            {{ user_form.password1 }}
        </div>

        <div style="margin-bottom: 15px;">
            <label>Confirmar Senha:</label><br>
            {{ user_form.password2 }}
        </div>

        <button type="submit" style="width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
            Registrar
        </button>
    </form>
</div>
{% endblock %}
